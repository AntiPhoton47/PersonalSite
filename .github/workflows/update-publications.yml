name: Update publications + build CV PDF

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"  # daily

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Python: update bib + render LaTeX fragment ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests bibtexparser jinja2

      - name: Update BibTeX from ORCID/DOI
        env:
          ORCID_TOKEN: ${{ secrets.ORCID_TOKEN }}  # optional
        run: |
          python scripts/update_publications.py \
            --orcid "YOUR-ORCID-ID" \
            --bib "_bibliography/publications.bib"

      - name: Render CV publications fragment
        run: |
          python scripts/render_cv.py \
            --bib "_bibliography/publications.bib" \
            --out "CV/auto_publications.tex"

      # ---- LaTeX: build CV PDF via Tectonic ----
      - name: Install Tectonic
        run: |
          curl -L https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz
          sudo mv tectonic /usr/local/bin/tectonic
          tectonic --version

      - name: Build CV PDF
        run: |
          bash scripts/build_cv.sh

      # ---- Commit changes ----
      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _bibliography/publications.bib CV/auto_publications.tex assets/files/Phil_LeMaitre_CV.pdf
          git diff --cached --quiet || git commit -m "Auto-update publications + CV PDF"
          git push
