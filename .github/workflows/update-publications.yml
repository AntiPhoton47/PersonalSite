name: Update publications + CV

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"   # daily 03:17 UTC  [oai_citation:6‡GitHub Docs](https://docs.github.com/actions/using-workflows/events-that-trigger-workflows?utm_source=chatgpt.com)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests bibtexparser jinja2

      - name: Update BibTeX from ORCID/DOI
        env:
          ORCID_TOKEN: ${{ secrets.ORCID_TOKEN }}   # optional
        run: |
          python scripts/update_publications.py \
            --orcid "YOUR-ORCID-ID" \
            --bib "assets/bib/publications.bib"

      - name: Render CV publications fragment
        run: |
          python scripts/render_cv.py \
            --bib "_bibliography/publications.bib" \
            --out "cv/auto_publications.tex"

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/bib/publications.bib cv/auto_publications.tex
          git diff --cached --quiet || git commit -m "Auto-update publications + CV"
          git push
