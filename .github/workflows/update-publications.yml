name: Update publications + build CV PDF

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 1 * *"  # monthly

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- Python: update bib + render LaTeX fragment ----
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-tools.txt

      - name: Update publications, publication codes, and CV sources
        env:
          ORCID_CLIENT_ID: ${{ secrets.ORCID_CLIENT_ID }}
          ORCID_CLIENT_SECRET: ${{ secrets.ORCID_CLIENT_SECRET }}
        run: |
          python scripts/update_publications.py \
            --orcid "0000-0002-0414-5202" \
            --bib "_bibliography/publications.bib" \
            --sync-bib "assets/files/publications.bib" \
            --cv-tex "assets/files/CV/auto_publications.tex" \
            --research-md "research.md"

      - name: Update talks/posters generated files
        run: |
          python scripts/update_talks_posters.py --check-online

      # ---- LaTeX: build CV PDF via Tectonic ----
      - name: Install Tectonic
        run: |
          curl -L https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz
          sudo mv tectonic /usr/local/bin/tectonic
          tectonic --version

      - name: Build CV PDF
        run: |
          bash scripts/build_cv.sh

      # ---- Commit changes ----
      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            _bibliography/publications.bib \
            assets/files/publications.bib \
            research.md \
            _data/talks.yml \
            _data/posters.yml \
            assets/files/CV/auto_publications.tex \
            assets/files/CV/auto_presentations.tex \
            assets/files/CV/Phil_LeMaitre_CV.pdf
          git diff --cached --quiet || git commit -m "Auto-update publications + CV PDF"
          git push
