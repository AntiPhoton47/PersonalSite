name: Update talks/posters metadata

on:
  workflow_dispatch:
  push:
    paths:
      - "assets/files/talks/**"
      - "assets/files/posters/**"
      - "scripts/update_talks_posters.py"
      - "_data/presentations_source.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-tools.txt

      - name: Update talks/posters outputs
        run: |
          python scripts/update_talks_posters.py --check-online

      - name: Install Tectonic
        run: |
          curl -L https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.15.0/tectonic-0.15.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz
          sudo mv tectonic /usr/local/bin/tectonic

      - name: Rebuild CV
        run: |
          bash scripts/build_cv.sh

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            _data/talks.yml \
            _data/posters.yml \
            research.md \
            assets/files/CV/auto_presentations.tex \
            assets/files/CV/Phil_LeMaitre_CV.pdf
          git diff --cached --quiet || git commit -m "Auto-update talks/posters index"
          git push
