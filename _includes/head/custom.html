  {% webmentions_head %}
{% endif %}

<script>
  (function () {
    const key = "mm-theme";
    const saved = localStorage.getItem(key);
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const mode = saved || (prefersDark ? "dark" : "light");

    function apply(mode) {
      document.getElementById("mm-dark").disabled = (mode !== "dark");
      document.getElementById("mm-light").disabled = (mode === "dark");
      document.documentElement.dataset.themeMode = mode;
      localStorage.setItem(key, mode);
      window.dispatchEvent(new CustomEvent("themechange", { detail: { mode } }));
    }

    window.toggleTheme = function () {
      const current = document.getElementById("mm-dark").disabled ? "light" : "dark";
      apply(current === "light" ? "dark" : "light");
    };

    apply(mode);
  })();
</script>

<script data-goatcounter="https://academicgoat.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>

<script>
  window.sitePostUrls = [
    {% for post in site.posts %}
      {{ post.url | relative_url | jsonify }}{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  document.addEventListener("click", function (event) {
    const trigger = event.target.closest("[data-random-post]");
    if (!trigger || !window.sitePostUrls || window.sitePostUrls.length === 0) {
      return;
    }

    const choice = window.sitePostUrls[Math.floor(Math.random() * window.sitePostUrls.length)];
    if (choice) {
      window.location.href = choice;
    }
  });

  function scrollCarousel(id, direction) {
    const track = document.querySelector(`[data-carousel-track="${id}"]`);
    if (!track) {
      return;
    }
    const step = Math.max(track.clientWidth * 0.82, 280);
    track.scrollBy({ left: direction * step, behavior: "smooth" });
  }

  document.addEventListener("click", function (event) {
    const prev = event.target.closest("[data-carousel-prev]");
    const next = event.target.closest("[data-carousel-next]");

    if (prev) {
      scrollCarousel(prev.getAttribute("data-carousel-prev"), -1);
    }

    if (next) {
      scrollCarousel(next.getAttribute("data-carousel-next"), 1);
    }
  });
</script>
