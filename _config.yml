title: "Philip A. LeMaitre"
logo: "/assets/images/IMG_0184.JPG"
description: "Doctoral Researcher • Notes on quantum ML, agency, and foundations"
url: "https://phillemaitre.com"   # change to your domain later
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "dark"           # try: default, air, dark, neon, mint, sunrise

footer_banner_image: /assets/images/IMG_7705.JPG
footer_banner_text: "What I hate is ignorance, smallness of imagination, the eye that sees no farther than its own lashes. All things are possible. Who you are is limited by who you think you are."
footer_banner_author: "Egyptian Book of the Dead"

breadcrumbs: true

enable_copy_code_button: true

teaser: /assets/images/Crab_MultiChandra_960.JPG

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-archives
  - jekyll-scholar
  - jekyll-webmention_io
  - jekyll-paginate
  - jemoji

webmentions:
  username: "phillemaitre.com"
  # Optional: keep builds fast and avoid huge fetches
  limit: 200
  cache_folder: .cache             # commit this folder or cache it in Actions
  max_attempts: 5
  templates:
    count: _includes/webmentions/count.html
    likes: _includes/webmentions/likes.html
    reposts: _includes/webmentions/reposts.html
    replies: _includes/webmentions/replies.html
    links: _includes/webmentions/links.html
    posts: _includes/webmentions/posts.html
    webmentions: _includes/webmentions/webmentions.html
  bad_uri_policy:
    unsupported:
      policy: ban
    error:
      policy: ignore
    failure:
      policy: retry
      retry_delay: [ 1, 12, 48, 120 ]
      max_retries: 5
    whitelist:
      - "^https://brid.gy/publish/"

author:
  name: "Philip A. LeMaitre"
  avatar: "/assets/images/IMG_2215.JPG"
  bio: "Research Interests: Quantum Machine Learning, Quantum Foundations, Artificial Intelligence, Quantum Gravity, Relativistic Quantum Information."
  location: "Earth"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:Philip.Lemaitre@uibk.ac.at"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/AntiPhoton47"
    - label: "Google Scholar"
      icon: "fas fa-graduation-cap"
      url: "https://scholar.google.ca/citations?hl=en&user=mw53fQgAAAAJ"
    - label: "ORCID"
      icon: "fab fa-orcid"
      url: "https://orcid.org/0000-0002-0414-5202"
    - label: "LinkedIn"
      icon: "fa-brands fa-linkedin-in"
      url: "https://linkedin.com/in/phil-lemaitre"
    - label: "BlueSky"
      icon: "fa-brands fa-bluesky"
      url: "https://bsky.app/profile/contextguy.bsky.social"
    - label: "X"
      icon: "fa-brands fa-x-twitter"
      url: "https://x.com/Philontre"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      show_date: true
      toc: true
      toc_sticky: true
      show_blog_archive: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      toc: true
      toc_sticky: true

social:
  links:
    - "https://github.com/AntiPhoton47"
    - "https://orcid.org/0000-0002-0414-5202"
    - "https://scholar.google.ca/citations?hl=en&user=mw53fQgAAAAJ"
    - "https://www.linkedin.com/in/phil-lemaitre"
    - "https://bsky.app/profile/contextguy.bsky.social"
    - "https://x.com/Philontre"

lunr:
  search_within_pages: true

scholar:
  style: assets/csl/my-style.csl
  locale: en
  bibliography: publications.bib
  bibliography_template: bib
  sort_by: year,month
  order: descending

jekyll-archives:
  enabled:
    - year
    - categories
    - tags
  layout: archive
  permalinks:
    year: '/:year/'
    tag: '/tag/:name/'
    category: '/category/:name/'

category_archive:
  type: jekyll-archives
  path: /category/

tag_archive:
  type: jekyll-archives
  path: /tag/

repository: AntiPhoton47/PersonalSite

comments:
  provider: "giscus"
  giscus:
    repo_id: "R_kgDORS3efA"
    category_name: "Blog Comments"
    category_id: "DIC_kwDORS3efM4C2vOU"
    discussion_term: "pathname"
    reactions_enabled: "1"
    theme: "dark"

search: true

feed:
  path: feed.xml

markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
