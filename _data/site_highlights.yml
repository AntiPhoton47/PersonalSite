featured_publications:
  - title: "Harvesting Contextuality from the Vacuum"
    url: "https://doi.org/10.1103/9ff3-4m5g"
    summary: "Shows that detectors coupled to a quantum field can extract contextuality directly from the vacuum, extending the resource-harvesting program beyond entanglement."
    category: "Paper"
  - title: "A Universal Quantum Computer from Relativistic Motion"
    url: "https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.134.190601"
    summary: "Builds a quantum-computing architecture where gate operations arise from relativistic motion and field-mediated interactions."
    category: "Paper"
  - title: "Multi-Excitation Projective Simulation with a Many-Body Physics Inspired Inductive Bias"
    url: "https://doi.org/10.1016/j.artint.2026.104489"
    summary: "Introduces a more expressive and interpretable learning architecture for projective simulation using a many-body inspired inductive bias."
    category: "Paper"

