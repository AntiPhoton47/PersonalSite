lay_summaries:
  - title: "Harvesting Contextuality from the Vacuum"
    audience: "For non-specialists"
    summary: "This paper asks whether some of the strangest nonclassical features of quantum theory can be pulled out of empty space itself. The main result is that the vacuum is not just a passive background: with the right detectors and measurements, it can supply a resource called contextuality."
    links:
      - label: "Read the paper"
        url: "https://doi.org/10.1103/9ff3-4m5g"
      - label: "Code"
        url: "https://github.com/AntiPhoton47/Contextuality-Harvesting"
  - title: "A Universal Quantum Computer from Relativistic Motion"
    audience: "For non-specialists"
    summary: "Instead of treating relativity as a nuisance for quantum computing, this work turns motion through spacetime into a computational tool. It shows how changing the paths of qubits and letting them interact through a field can implement a universal quantum computer."
    links:
      - label: "Read the paper"
        url: "https://journals.aps.org/prl/abstract/10.1103/PhysRevLett.134.190601"
      - label: "Watch the talk"
        url: "https://www.youtube.com/live/pAlDsCJH-ds?si=Mc8rZPqEzI948X2d"
      - label: "Code"
        url: "https://github.com/AntiPhoton47/RVQC"
  - title: "Multi-Excitation Projective Simulation"
    audience: "For non-specialists"
    summary: "This project extends an interpretable AI model so it can reason about several active concepts at once instead of one at a time. The payoff is a more expressive agent design that still aims to keep its decision process understandable."
    links:
      - label: "Read the paper"
        url: "https://doi.org/10.1016/j.artint.2026.104489"
      - label: "Code"
        url: "https://github.com/MariusKrumm/ManyBodyMEPS"
  - title: "Polymer Self-Consistent Field Theory of Atoms"
    audience: "For non-specialists"
    summary: "These papers explore an unusual way of modeling atoms by translating quantum many-electron structure into a polymer-inspired field theory. The goal is to understand atomic shell structure and electron behavior from a fresh conceptual angle."
    links:
      - label: "Gaussian basis paper"
        url: "https://onlinelibrary.wiley.com/doi/10.1002/qua.27111"
      - label: "Symmetry-breaking paper"
        url: "https://pubs.aip.org/aip/jcp/article/158/6/064301/2875147/On-the-origins-of-spontaneous-spherical-symmetry"
      - label: "Code"
        url: "https://github.com/AntiPhoton47/quantum-chem"
