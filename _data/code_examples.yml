notebook-demo:
  markdown_blocks:
  - '# Notebook demo


    This notebook is executed during the site build. Its markdown narrative, printed
    output, and generated plot are embedded into the page.'
  params:
    max_n: 7
  plots:
  - /assets/generated/code/notebook-demo/plot-1.png
  source_code: 'import matplotlib.pyplot as plt


    params = globals().get("CODE_EXAMPLE_PARAMS", {})

    max_n = int(params.get("max_n", 7))


    xs = list(range(max_n + 1))

    ys = [value ** 2 for value in xs]


    plt.figure(figsize=(6.4, 3.8))

    plt.bar(xs, ys, color="#22c55e")

    plt.title("Squares")

    plt.xlabel("n")

    plt.ylabel("n^2")

    plt.tight_layout()

    plt.show()


    print(f"Computed squares up to {max_n}:", ys)'
  source_url: /assets/code/notebook_demo.ipynb
  stderr: ''
  stdout: '<Figure size 640x380 with 1 Axes>

    Computed squares up to 7: [0, 1, 4, 9, 16, 25, 36, 49]'
  success: true
  title: Notebook demo
  type: notebook
