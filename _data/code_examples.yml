sine-wave-demo:
  markdown_blocks: []
  params:
    amplitude: 1.0
    frequency: 1.0
    step: 0.05
  plots:
  - /assets/generated/code/sine-wave-demo/plot-1.png
  source_code: "\"\"\"Sine wave demo\"\"\"\n\nfrom math import pi, sin\n\nimport matplotlib.pyplot\
    \ as plt\n\nPARAMS = globals().get(\"CODE_EXAMPLE_PARAMS\", {})\nAMPLITUDE = float(PARAMS.get(\"\
    amplitude\", 1.0))\nFREQUENCY = float(PARAMS.get(\"frequency\", 1.0))\nSTEP =\
    \ float(PARAMS.get(\"step\", 0.05))\n\nsample_count = max(2, int(round(12.5 /\
    \ STEP)) + 1)\nxs = [index * STEP for index in range(sample_count)]\nys = [AMPLITUDE\
    \ * sin(2 * pi * FREQUENCY * value) for value in xs]\n\nplt.figure(figsize=(7,\
    \ 3.8))\nplt.plot(xs, ys, color=\"#0ea5e9\", linewidth=2.4, label=f\"{AMPLITUDE:.2f}\
    \ sin(2\u03C0 {FREQUENCY:.2f} x)\")\nplt.axhline(0.0, color=\"#94a3b8\", linewidth=1,\
    \ linestyle=\"--\")\nplt.xlabel(\"x\")\nplt.ylabel(\"Amplitude\")\nplt.title(\"\
    Sine wave\")\nplt.legend()\nplt.tight_layout()\nplt.show()\n\nprint(f\"Generated\
    \ {len(xs)} sample points with amplitude={AMPLITUDE} and frequency={FREQUENCY}.\"\
    )"
  source_url: /assets/code/sine_wave_demo.py
  stderr: ''
  stdout: Generated 251 sample points with amplitude=1.0 and frequency=1.0.
  success: true
  title: Sine wave demo
  type: python
