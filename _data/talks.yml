  abstract: We present an explicit construction of a relativistic quantum computing
    architecture using a variational quantum circuit approach that is shown to allow
    for universal quantum computing. The variational quantum circuit consists of tunable
    single-qubit rotations and entangling gates that are implemented successively.
    The single qubit rotations are parameterized by the proper time intervals of the
    qubits&#39; trajectories and can be tuned by varying their relativistic motion
    in spacetime. The…
